version: "3.8"

# ICU 多床位监护与早期预警系统
# 一键拉起：docker compose up -d
# 自检：    bash scripts/self_check.sh

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: icu-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: icu_monitor
      POSTGRES_USER: icu
      POSTGRES_PASSWORD: icu_pwd_2026
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./sql/01_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U icu -d icu_monitor"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: icu-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: icu-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: icu-backend
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://timescaledb:5432/icu_monitor
      SPRING_DATASOURCE_USERNAME: icu
      SPRING_DATASOURCE_PASSWORD: icu_pwd_2026
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ICU_ALERT_DEDUP_WINDOW_SEC: 60
      ICU_ALERT_ESCALATION_THRESHOLD: 3
      ICU_PLAYBACK_WINDOW_MIN: 30
      ICU_TCP_ADAPTER_PORT: 9100
      ICU_HL7_ADAPTER_PORT: 9200
      ICU_PRIVATE_TCP_PORT: 9300
    ports:
      - "8080:8080"
      - "9100:9100"
      - "9200:9200"
      - "9300:9300"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: icu-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  timescale_data:
